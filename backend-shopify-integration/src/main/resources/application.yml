spring:
  application:
    name: shopify-integration-service
  
  # 数据源配置 (主从分离)
  datasource:
    master:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: HikariPool-Shopify-Master
    
    slave:
      url: jdbc:mysql://${DB_SLAVE_HOST:localhost}:${DB_SLAVE_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_SLAVE_USER:root}
      password: ${DB_SLAVE_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: HikariPool-Shopify-Slave
  
  # Flyway 迁移 (禁用 - 表已手动创建)
  flyway:
    enabled: false
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api/shopify
  tomcat:
    threads:
      max: 150
      min-spare: 10
    max-connections: 4096
    accept-count: 50

# 应用配置
app:
  encryption:
    master-key: ${ENCRYPTION_MASTER_KEY:InfluencerMarketingSecretKey2025Ver256Bit}
  
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# 日志配置
logging:
  level:
    root: INFO
    com.athlunakms.shopify: INFO
    org.hibernate.SQL: ERROR
    org.springframework: WARN
  file:
    name: logs/shopify-service.log
    max-size: 10MB
    max-history: 30

# 服务集成配置
influencer:
  service:
    url: ${INFLUENCER_SERVICE_URL:http://localhost:8082/influencer-api}

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""
