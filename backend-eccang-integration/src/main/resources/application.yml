spring:
  application:
    name: eccang-integration-service
  
  # 数据源配置 (主从分离)
  datasource:
    master:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: HikariPool-Eccang-Master
    
    slave:
      url: jdbc:mysql://${DB_SLAVE_HOST:localhost}:${DB_SLAVE_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
      username: ${DB_SLAVE_USER:root}
      password: ${DB_SLAVE_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: HikariPool-Eccang-Slave
  
  # Flyway 迁移 (禁用 - 表已手动创建)
  flyway:
    enabled: false
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api/eccang
  tomcat:
    threads:
      max: 150
      min-spare: 10
    max-connections: 4096
    accept-count: 50

# 应用配置
app:
  encryption:
    master-key: ${ENCRYPTION_MASTER_KEY:InfluencerMarketingSecretKey2025Ver256Bit}
  
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# 日志配置
logging:
  level:
    root: INFO
    com.athlunakms.eccang: INFO
    org.hibernate.SQL: ERROR
    org.springframework: WARN
  file:
    name: logs/eccang-service.log
    max-size: 10MB
    max-history: 30

# 易仓 OpenAPI（红人系统应用）
eccang:
  api:
    url: ${ECCANG_API_URL:http://openapi-web.eccang.com/openApi/api/unity}
    app-key: ${ECCANG_APP_KEY:28cf5e2b52054b72}
    app-secret: ${ECCANG_APP_SECRET:ac26676dc9fe2907}
    # 在易仓后台「应用管理 → 授权状态 → 查看」获取
    service-id: ${ECCANG_SERVICE_ID:ET1YYF}
  sync:
    # 每页拉取条数（越小对易仓压力越低）
    # 主数据源：amazon-listing（推荐）| wms | both
    primary-source: ${ECCANG_SYNC_PRIMARY_SOURCE:amazon-listing}
    page-size: ${ECCANG_SYNC_PAGE_SIZE:1000}
    # 分页请求间隔（毫秒），避免连续打满 API
    page-delay-ms: ${ECCANG_SYNC_PAGE_DELAY_MS:400}
    # 同一店铺两次全量同步最短间隔（分钟）
    cooldown-minutes: ${ECCANG_SYNC_COOLDOWN_MINUTES:30}
    # 定时任务店铺间隔（毫秒）
    store-delay-ms: ${ECCANG_SYNC_STORE_DELAY_MS:3000}
    # 429 限流时自动重试次数与初始退避（毫秒，指数翻倍）
    rate-limit-retries: ${ECCANG_SYNC_RATE_LIMIT_RETRIES:5}
    rate-limit-backoff-ms: ${ECCANG_SYNC_RATE_LIMIT_BACKOFF_MS:10000}
    # 定时全量同步开关（默认关闭，避免与手动同步争抢 API 配额）
    scheduler:
      enabled: ${ECCANG_SYNC_SCHEDULER_ENABLED:false}

# 服务集成配置
influencer:
  service:
    url: ${INFLUENCER_SERVICE_URL:http://localhost:8082/influencer-api}

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""
