# 本地开发基础设施（仅数据库 + Redis）
# 用法: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: influencer-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: Yaoxingxuanlv-39
      MYSQL_DATABASE: hongrenfuwu
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pYaoxingxuanlv-39"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: influencer-redis-dev
    command: redis-server --requirepass hongrenfuwu2025
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql-data:
