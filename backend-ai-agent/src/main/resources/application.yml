server:
  port: 8085

spring:
  application:
    name: backend-ai-agent
  # 本地默认 local（读取 application-local.yml）；生产请设 SPRING_PROFILES_ACTIVE=default 并配置环境变量
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd HH:mm:ss

  datasource:
    url: jdbc:postgresql://${VECTOR_DB_HOST:localhost}:${VECTOR_DB_PORT:5432}/${VECTOR_DB_NAME:influencer_vector}?useUnicode=true&characterEncoding=utf8
    username: ${VECTOR_DB_USER:postgres}
    password: ${VECTOR_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2

langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_DOUBAO_API_KEY:}
      base-url: ${AI_DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      model-name: ${AI_DOUBAO_CHAT_MODEL:}
      max-tokens: 2000
      temperature: 0.1
    # 小A TokenStream 对话必须配置 streaming-chat-model（可与 chat-model 共用同一接入点）
    streaming-chat-model:
      api-key: ${AI_DOUBAO_API_KEY:}
      base-url: ${AI_DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      model-name: ${AI_DOUBAO_CHAT_MODEL:}
      max-tokens: 2000
      temperature: 0.1
# 向量化走 app.volcengine.embedding（多模态 /embeddings/multimodal），见 VolcengineMultimodalEmbeddingModel

app:
  copilot:
    work-start: ${AI_COPILOT_WORK_START:09:00}
    work-end: ${AI_COPILOT_WORK_END:18:00}
  jwt:
    secret: ${JWT_SECRET:Influencer-Marketing-JWT-Secret-Key-2026-Dev-Only}
  internal-api:
    token: ${INTERNAL_API_TOKEN:influencer-internal-dev-token}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  volcengine:
    embedding:
      api-key: ${AI_DOUBAO_API_KEY:}
      base-url: ${AI_DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      endpoint-id: ${AI_DOUBAO_EMBED_MODEL:}
      dimensions: ${AI_EMBED_DIMENSIONS:1024}

resilience4j:
  ratelimiter:
    instances:
      aiSearchLimiter:
        limitForPeriod: 15
        limitRefreshPeriod: 1m
      vectorSyncLimiter:
        limitForPeriod: 120
        limitRefreshPeriod: 1m
  circuitbreaker:
    instances:
      doubaoApiBreaker:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  timelimiter:
    instances:
      embeddingTimeout:
        timeoutDuration: 3s

services:
  backend-influencer:
    url: ${INFLUENCER_SERVICE_URL:http://localhost:8082/influencer-api}
  backend-mail:
    url: ${MAIL_SERVICE_URL:http://localhost:8086/mail-api}
  backend-shopify:
    url: ${SHOPIFY_SERVICE_URL:http://localhost:8081/api/shopify}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.athlunakms.ai: INFO
    dev.langchain4j: WARN
