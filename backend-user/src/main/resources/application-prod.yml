spring:
  # 生产环境数据源配置（从环境变量读取）
  datasource:
    master:
      url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 50
        minimum-idle: 10
        connection-test-query: SELECT 1
        leak-detection-threshold: 60000
  
    slave:
      url: jdbc:mysql://${DB_SLAVE_HOST}:${DB_SLAVE_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
      username: ${DB_SLAVE_USER}
      password: ${DB_SLAVE_PASSWORD}
      hikari:
        maximum-pool-size: 50
        minimum-idle: 10
        connection-test-query: SELECT 1
        leak-detection-threshold: 60000
  
  # 生产环境Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 5000
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10

# 生产环境日志配置
logging:
  level:
    root: INFO
    com.athlunakms: INFO
    org.springframework: WARN
  file:
    name: /var/log/influencer-marketing/backend.log
    max-size: 50MB
    max-history: 90

# 生产环境关闭Swagger
springdoc:
  swagger-ui:
    enabled: false

