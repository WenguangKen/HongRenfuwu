spring:
  application:
    name: 红人营销系统-用户权限后台
  
  profiles:
    active: dev
  
  # 数据源配置（主从分离）
  datasource:
    master:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    
    slave:
      url: jdbc:mysql://${DB_SLAVE_HOST:localhost}:${DB_SLAVE_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_SLAVE_USER:root}
      password: ${DB_SLAVE_PASSWORD:Yaoxingxuanlv-39}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Flyway数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration/user,classpath:db/migration/shopify
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
    table: flyway_history_app
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  
  # Jackson配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 应用配置
app:
  # 应用版本
  version: 1.0.0
  
  # JWT配置
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
    expiration: 604800000  # 7天（毫秒），前端Token存活由后端的8小时闲置超时机制控制
    refresh-expiration: 604800000  # 7天（毫秒）
  
  # 加密配置
  # 生产环境警告：必须通过环境变量 ENCRYPTION_MASTER_KEY 设置32字节以上的强密钥
  encryption:
    master-key: ${ENCRYPTION_MASTER_KEY:InfluencerMarketingSecretKey2025Ver256Bit}
    algorithm: AES/GCM/NoPadding
    key-size: 256
  
  # 验证码配置
  captcha:
    length: 6
    expire-minutes: 5
    allowed-chars: ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789
  
  # 登录配置
  login:
    max-attempts: 5  # 最大尝试次数
    lock-duration: 1800  # 锁定时长（秒，30分钟）
    ip-rate-limit: 5  # IP每分钟最大请求数
    email-rate-limit: 10  # 邮箱每小时最大请求数
    session-timeout: 28800  # 会话超时（秒，8小时）
  
  # 单点登录配置
  sso:
    enabled: true
    conflict-timeout: 30  # 冲突处理超时（秒）
  
  # 初始管理员账号配置（仅首次启动时使用）
  # 生产环境警告：必须通过环境变量 INITIAL_ADMIN_PASSWORD 设置强密码，不要使用默认密码
  initial-admin:
    enabled: true  # 是否启用初始管理员账号自动创建
    username: ${INITIAL_ADMIN_USERNAME:admin}
    email: ${INITIAL_ADMIN_EMAIL:wenguangfeifan@outlook.com}
    password: ${INITIAL_ADMIN_PASSWORD:yijia6688}  # 生产环境必须通过环境变量覆盖
    role-name: ${INITIAL_ADMIN_ROLE_NAME:超级管理员}

# 日志配置
logging:
  level:
    root: INFO
    com.athlunakms: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/influencer-user-backend.log
    max-size: 10MB
    max-history: 30

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""

# OpenAPI/Swagger配置
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
  show-actuator: false
  packages-to-scan: com.athlunakms
  paths-to-match: /api/**
