server {
    listen 80;
    server_name localhost;

    # 开启 gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 最大允许上传文件大小：1000MB
    client_max_body_size 1000m;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 支持 Vue Router/React Router 单页面应用 (SPA)
        try_files $uri $uri/ /index.html;
    }

    # AI 智能体服务 (SSE 流式，需关闭缓冲)
    location ^~ /ai-agent-api/ {
        proxy_pass http://backend-ai-agent:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        chunked_transfer_encoding on;
    }

    # 红人管理服务 (分佣、转换订单等)
    location ^~ /influencer-api/ {
        proxy_pass http://backend-influencer:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 延长处理时间，防止大文件超时
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Shopify 代理
    location ^~ /api/shopify/ {
        proxy_pass http://backend-shopify:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Webhook 代理
    location ^~ /api/webhook/ {
        proxy_pass http://backend-webhook:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 长连接支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # 用户/权限/通用后端 API
    location ^~ /api/ {
        proxy_pass http://backend-user:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # MinIO 对象存储代理 (解决跨域和 HTTPS Mixed Content)
    location ^~ /influencer-storage/ {
        # 转发到实际暴露的内网 MinIO API 地址 (9000是API，9001是控制台)
        proxy_pass http://192.168.5.135:9000/influencer-storage/;
        proxy_set_header Host 192.168.5.135:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 视频流播放：传递 Range 请求头（断点续传/seek）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;

        # 关闭缓冲，直接流式传输大文件
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        
        # 大文件支持
        client_max_body_size 500M;
        proxy_connect_timeout 300;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        # CORS 头（允许前端视频播放器跨域请求）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, If-Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;
        add_header Accept-Ranges bytes always;

        # OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
