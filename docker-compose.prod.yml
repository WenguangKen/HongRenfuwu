services:
  # ๆณจ๏ฟฝ?๏ฟฝ๏ฟฝ?MySQL ไธ๏ฟฝ?๏ฟฝ Docker ไธญ๏ฟฝ?ไฝฟ๏ฟฝ?๏ฟฝ๏ฟฝ?๏ฟฝ?๏ฟฝ๏ฟฝ?๏ฟฝๆฎ๏ฟฝ?192.168.5.135
  
  redis:
    image: redis:7-alpine
    container_name: influencer-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass hongrenfuwu2025
    volumes:
      - ./redis/data:/data
    ports:
      - "6379:6379"
    networks:
      - influencer-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"



  backend-user:
    container_name: influencer-backend-user-prod
    image: influencer-user:1.0.0
    build:
      context: ./backend-user
      dockerfile: ../deploy/Dockerfile.deploy
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=192.168.5.135
      - DB_PORT=3306
      - DB_NAME=hongrenfuwu
      - DB_USER=root
      - DB_PASSWORD=Yaoxingxuanlv-39
      - DB_SLAVE_HOST=192.168.5.130
      - DB_SLAVE_PORT=3309
      - DB_SLAVE_USER=root
      - DB_SLAVE_PASSWORD=Yaoxingxuanlv-39
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=hongrenfuwu2025
    depends_on:
      - redis
    networks:
      - influencer-net
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  backend-influencer:
    container_name: influencer-backend-influencer-prod
    image: influencer-service:1.0.4
    build:
      context: ./backend-influencer
      dockerfile: ../deploy/Dockerfile.deploy
    restart: always
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=192.168.5.135
      - DB_PORT=3306
      - DB_NAME=hongrenfuwu
      - DB_USER=root
      - DB_PASSWORD=Yaoxingxuanlv-39
      - DB_SLAVE_HOST=192.168.5.130
      - DB_SLAVE_PORT=3309
      - DB_SLAVE_USER=root
      - DB_SLAVE_PASSWORD=Yaoxingxuanlv-39
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=hongrenfuwu2025
      - eccang_INTEGRATION_URL=http://backend-eccang:8081
      - USER_SERVICE_URL=http://backend-user:8080
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-influencer-internal-dev-token}
      - AI_AGENT_URL=http://backend-ai-agent:8085
    depends_on:
      - redis
    networks:
      - influencer-net
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  backend-eccang:
    container_name: influencer-backend-eccang-prod
    image: influencer-eccang:1.0.4
    build:
      context: ./backend-eccang-integration
      dockerfile: ../deploy/Dockerfile.deploy
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=192.168.5.135
      - DB_PORT=3306
      - DB_NAME=hongrenfuwu
      - DB_USER=root
      - DB_PASSWORD=Yaoxingxuanlv-39
      - DB_SLAVE_HOST=192.168.5.130
      - DB_SLAVE_PORT=3309
      - DB_SLAVE_USER=root
      - DB_SLAVE_PASSWORD=Yaoxingxuanlv-39
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=hongrenfuwu2025
      - ECCANG_APP_KEY=${ECCANG_APP_KEY:-28cf5e2b52054b72}
      - ECCANG_APP_SECRET=${ECCANG_APP_SECRET:-ac26676dc9fe2907}
      - ECCANG_SERVICE_ID=ET1YYF
    depends_on:
      - redis
    networks:
      - influencer-net
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: influencer-pgvector-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:-postgres}
      POSTGRES_DB: influencer_vector
    volumes:
      - ./pgvector/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - influencer-net

  backend-ai-agent:
    container_name: influencer-backend-ai-agent-prod
    image: influencer-ai-agent:1.0.0
    build:
      context: ./backend-ai-agent
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - VECTOR_DB_HOST=pgvector
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_NAME=influencer_vector
      - VECTOR_DB_USER=postgres
      - VECTOR_DB_PASSWORD=${VECTOR_DB_PASSWORD:-postgres}
      - AI_DOUBAO_API_KEY=${AI_DOUBAO_API_KEY:-}
      - AI_DOUBAO_BASE_URL=${AI_DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - AI_DOUBAO_CHAT_MODEL=${AI_DOUBAO_CHAT_MODEL:-}
      - AI_DOUBAO_EMBED_MODEL=${AI_DOUBAO_EMBED_MODEL:-}
      - JWT_SECRET=${JWT_SECRET:-Influencer-Marketing-JWT-Secret-Key-2026-Dev-Only}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-influencer-internal-dev-token}
      - INFLUENCER_SERVICE_URL=http://backend-influencer:8082/influencer-api
      - eccang_SERVICE_URL=http://backend-eccang:8081/api/eccang
    depends_on:
      - pgvector
      - backend-influencer
    networks:
      - influencer-net
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"


  frontend:
    container_name: influencer-frontend-prod
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - influencer-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  influencer-net:
    driver: bridge

