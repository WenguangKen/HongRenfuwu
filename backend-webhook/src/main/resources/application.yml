server:
  port: 8083
  tomcat:
    threads:
      max: 100
      min-spare: 5
    max-connections: 2048
    accept-count: 30

spring:
  application:
    name: webhook-service
  
  # 数据源配置 (HikariCP 连接池)
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hongrenfuwu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Yaoxingxuanlv-39}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HikariPool-Webhook
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Flyway 迁移 (禁用 - 表已手动创建)
  flyway:
    enabled: false

# Shopify Webhook 配置
shopify:
  webhook:
    secret: ${SHOPIFY_WEBHOOK_SECRET:7cf398f602879a96c2b8a13bdecaac9fbd55d5db20852e4bb00d4bef6ed9c7ae}

app:
  encryption:
    master-key: ${APP_ENCRYPTION_MASTER_KEY:InfluencerMarketingSecretKey2025Ver256Bit}

# 日志配置
logging:
  level:
    com.athlunakms.webhook: INFO
    org.springframework.web: INFO
  file:
    name: logs/webhook-service.log
    max-size: 10MB
    max-history: 30

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""
  endpoint:
    health:
      show-details: always
